<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Halal Checker{% endblock %}</title>
    <style>
        :root {
            --green: #1a7a4a;
            --green-light: #e8f5ef;
            --red: #c0392b;
            --red-light: #fdf0ef;
            --yellow: #d4a017;
            --yellow-light: #fef9e7;
            --gray: #6b7280;
            --border: #e5e7eb;
            --text: #111827;
            --bg: #f9fafb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: var(--green);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.01em; }
        header span { font-size: 1.5rem; }
        nav { margin-left: auto; }
        nav a { color: rgba(255,255,255,0.85); text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }
        nav a:hover { color: white; }
        main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: var(--green); }
        label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.4rem; color: var(--gray); }
        input[type=text], input[type=file], textarea, select {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--green); }
        textarea { min-height: 100px; resize: vertical; }
        button[type=submit], .btn {
            background: var(--green);
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        button[type=submit]:hover, .btn:hover { background: #155f3a; }
        .madhab-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .madhab-row label { margin: 0; }
        .madhab-btn {
            flex: 1;
            padding: 0.5rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.15s;
            background: white;
        }
        .madhab-btn:has(input:checked) {
            border-color: var(--green);
            background: var(--green-light);
            color: var(--green);
        }
        .madhab-btn input { display: none; }
        .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; }
        .tab {
            padding: 0.625rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gray);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .tab.active { color: var(--green); border-bottom-color: var(--green); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .messages { margin-bottom: 1rem; }
        .message {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .message.error { background: var(--red-light); color: var(--red); border: 1px solid #fca5a5; }
        .message.warning { background: var(--yellow-light); color: var(--yellow); border: 1px solid #fcd34d; }
        footer { text-align: center; color: var(--gray); font-size: 0.8rem; padding: 2rem 1rem; }
    </style>
</head>
<body>
    <header>
        <span>☪️</span>
        <h1><a href="/" style="color:white;text-decoration:none;">Halal Checker</a></h1>
        <nav>
            <a href="/">Check</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>

    <main>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer>Halal Checker — Always verify with certified scholars for critical decisions.</footer>
</body>
</html>
