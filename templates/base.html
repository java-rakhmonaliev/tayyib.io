<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TAYYIB — Halal Checker{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=block" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream: #FFFDF5;
            --black: #000000;
            --red: #FF6B6B;
            --yellow: #FFD93D;
            --violet: #C4B5FD;
            --white: #FFFFFF;
            --green: #6EE7B7;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--cream);
            color: var(--black);
            min-height: 100vh;
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 28px 28px;
            background-attachment: fixed;
        }

        /* HEADER */
        header {
            background: var(--black);
            border-bottom: 4px solid var(--black);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-box {
            background: var(--yellow);
            border: 3px solid var(--white);
            padding: 0.3rem 0.6rem;
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--black);
            letter-spacing: -0.02em;
            box-shadow: 4px 4px 0px 0px var(--white);
            transform: rotate(-1deg);
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .logo-sub {
            font-size: 0.7rem;
            color: var(--yellow);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            display: block;
            margin-top: -4px;
        }

        nav { display: flex; gap: 0.5rem; align-items: center; }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.4rem 0.75rem;
            border: 2px solid transparent;
            transition: all 0.1s ease;
        }

        nav a:hover {
            border: 2px solid var(--white);
            background: var(--white);
            color: var(--black);
            box-shadow: 4px 4px 0px 0px var(--yellow);
        }

        nav a.admin-link {
            background: var(--red);
            border: 2px solid var(--white);
            color: var(--white);
            box-shadow: 3px 3px 0px 0px var(--white);
        }

        nav a.admin-link:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px 0px var(--white);
        }

        /* MAIN */
        main {
            max-width: 900px;
            margin: 2.5rem auto;
            padding: 0 1.25rem;
        }

        /* CARDS */
        .card {
            background: var(--white);
            border: 4px solid var(--black);
            box-shadow: 8px 8px 0px 0px var(--black);
            margin-bottom: 2rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px 0px var(--black);
        }

        .card-header {
            background: var(--black);
            color: var(--white);
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-header h2 {
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--yellow);
        }

        .card-body { padding: 1.5rem; }

        /* FORMS */
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            color: var(--black);
        }

        input[type=text], input[type=file], textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 4px solid var(--black);
            background: var(--cream);
            font-size: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            outline: none;
            transition: all 0.1s ease;
            border-radius: 0;
        }

        input:focus, textarea:focus, select:focus {
            background: var(--yellow);
            box-shadow: 4px 4px 0px 0px var(--black);
        }

        textarea { min-height: 110px; resize: vertical; }

        /* BUTTONS */
        button[type=submit], .btn {
            background: var(--red);
            color: var(--white);
            border: 4px solid var(--black);
            padding: 0.75rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 900;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            box-shadow: 6px 6px 0px 0px var(--black);
            transition: all 0.1s ease;
            text-decoration: none;
            display: inline-block;
            border-radius: 0;
        }

        button[type=submit]:hover, .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px 0px var(--black);
        }

        button[type=submit]:active, .btn:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .btn-yellow {
            background: var(--yellow);
            color: var(--black);
        }

        .btn-black {
            background: var(--black);
            color: var(--white);
        }

        .btn-black:hover { box-shadow: 8px 8px 0px 0px var(--red); }

        /* TABS */
        .tabs {
            display: flex;
            border-bottom: 4px solid var(--black);
            margin-bottom: 1.5rem;
            gap: 0;
        }

        .tab {
            padding: 0.7rem 1.25rem;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--black);
            border: none;
            border-right: 4px solid var(--black);
            background: var(--cream);
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.1s ease;
        }

        .tab:last-child { border-right: none; }
        .tab:hover { background: var(--violet); }

        .tab.active {
            background: var(--yellow);
            box-shadow: inset 0 -4px 0 var(--black);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* MADHAB TOGGLE */
        .madhab-row { display: flex; gap: 0; margin-bottom: 1.5rem; }

        .madhab-btn {
            flex: 1;
            padding: 0.75rem;
            border: 4px solid var(--black);
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: var(--cream);
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.1s ease;
            margin-right: -4px;
        }

        .madhab-btn:last-child { margin-right: 0; }
        .madhab-btn input { display: none; }

        .madhab-btn:has(input:checked) {
            background: var(--violet);
            box-shadow: inset 4px 4px 0px var(--black);
            z-index: 1;
        }

        /* MESSAGES */
        .messages { margin-bottom: 1.5rem; }

        .message {
            padding: 0.875rem 1rem;
            border: 4px solid var(--black);
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 700;
            box-shadow: 4px 4px 0px 0px var(--black);
        }

        .message.error { background: var(--red); color: var(--white); }
        .message.warning { background: var(--yellow); color: var(--black); }
        .message.success { background: var(--green); color: var(--black); }

        /* BADGES */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border: 3px solid var(--black);
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .badge-halal { background: var(--green); color: var(--black); }
        .badge-haram { background: var(--red); color: var(--white); }
        .badge-questionable { background: var(--yellow); color: var(--black); }
        .badge-hanafi_haram { background: var(--red); color: var(--white); }
        .badge-shafii_haram { background: var(--red); color: var(--white); }

        /* FOOTER */
        footer {
            background: var(--black);
            color: var(--yellow);
            text-align: center;
            padding: 1.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-top: 4px solid var(--black);
            margin-top: 3rem;
        }

        /* FIELD SPACING */
        .field { margin-bottom: 1.25rem; }

        @media (max-width: 640px) {
            header { padding: 0 1rem; }
            .logo-text { font-size: 1.1rem; }
            main { margin: 1.5rem auto; padding: 0 1rem; }
            .card { box-shadow: 5px 5px 0px 0px var(--black); }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <span class="logo-box">☪</span>
            <span>
                <span class="logo-text">Tayyib</span>
                <span class="logo-sub">Halal Checker</span>
            </span>
        </a>
        <nav>
            <a href="/">Check</a>
            <a href="/admin/" class="admin-link">Admin</a>
        </nav>
    </header>

    <main>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">⚠ {{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        TAYYIB.IO — Always verify with certified scholars for critical decisions.
    </footer>
</body>
</html>
